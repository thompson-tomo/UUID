version: '3.8'

services:
  uuid-docs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uuid-docs
    ports:
      - "4389:4389"
    restart: unless-stopped
    networks:
      - uuid-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4389"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  uuid-network:
    name: uuid-network
    driver: bridge 